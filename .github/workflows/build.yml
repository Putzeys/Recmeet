name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift release)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build -c release
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: recmeet-macos-cli
          path: .build/release/recmeet
          if-no-files-found: error
      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: recmeet-macos-app-binary
          path: .build/release/RecmeetApp
          if-no-files-found: error

  windows:
    name: Windows (Swift release, CLI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift toolchain
        uses: compnerd/gha-setup-swift@v0.3.0
        with:
          branch: swift-5.10-release
          tag: 5.10-RELEASE
      - name: Show toolchain
        run: swift --version
      - name: Build CLI
        run: swift build -c release --product recmeet
      - name: Upload Windows CLI
        uses: actions/upload-artifact@v4
        with:
          name: recmeet-windows-cli
          path: .build/release/recmeet.exe
          if-no-files-found: error
